services:
  - type: web
    name: splitly-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
